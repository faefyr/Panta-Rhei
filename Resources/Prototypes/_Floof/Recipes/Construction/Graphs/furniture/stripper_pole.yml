- type: constructionGraph
  id: Stripperpole
  start: start
  graph:
  - node: start
    actions:
    - !type:DeleteEntity {}
    edges:
    - to: FurnStripPoleInit
      steps:
      - material: Steel
        amount: 3
        doAfter: 1

  - node: FurnStripPoleInit
    entity: StripperPoleInit
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 3
      steps:
      - tool: Screwing
        doAfter: 1
    - to: FurnStripPole
      steps:
      - material: MetalRod
        amount: 2
        doAfter: 2

  - node: FurnStripPole
    entity: StripperPole
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 3
      - !type:SpawnPrototype
        prototype: PartRodMetal
        amount: 2
      steps:
      - tool: Screwing
        doAfter: 4

- type: construction
  id: FurnStripPole
  graph: Stripperpole
  startNode: start
  targetNode: FurnStripPole
  category: construction-category-furniture
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
  - !type:TileNotBlocked
